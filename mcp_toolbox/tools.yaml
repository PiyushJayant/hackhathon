sources:
  alloydb-productivity:
    kind: alloydb-postgres
    project: ${GOOGLE_CLOUD_PROJECT}
    region: ${ALLOYDB_REGION}
    cluster: ${ALLOYDB_CLUSTER}
    instance: ${ALLOYDB_INSTANCE}
    ipType: ${ALLOYDB_IP_TYPE}
    database: ${ALLOYDB_DATABASE}
    user: ${ALLOYDB_USER}
    password: ${ALLOYDB_PASSWORD}

tools:

  # ── Task Tools ────────────────────────────────────────────────────────────────

  create_task:
    kind: postgres-sql
    source: alloydb-productivity
    description: >
      Create a new task in the productivity database.
      Provide a title, optional description, priority (low/medium/high), and optional due date.
    parameters:
      - name: title
        type: string
        description: Title of the task
      - name: description
        type: string
        description: Detailed description of the task
      - name: priority
        type: string
        description: Priority level — must be low, medium, or high
      - name: due_date
        type: string
        description: Due date in YYYY-MM-DD format, or empty string if none
    statement: >
      INSERT INTO tasks (title, description, priority, due_date)
      VALUES ($1, $2, $3, $4)
      RETURNING id, title, priority, status, due_date, created_at;

  list_tasks:
    kind: postgres-sql
    source: alloydb-productivity
    description: >
      List tasks from the database. Pass a specific status to filter
      (pending, in_progress, done), or pass 'all' to get every task.
    parameters:
      - name: status
        type: string
        description: "Filter by task status: pending, in_progress, done, or all"
    statement: >
      SELECT id, title, description, priority, status, due_date, created_at
      FROM tasks
      WHERE $1 = 'all' OR status = $1
      ORDER BY created_at DESC;

  update_task_status:
    kind: postgres-sql
    source: alloydb-productivity
    description: Update the status of a task identified by its ID.
    parameters:
      - name: task_id
        type: integer
        description: ID of the task to update
      - name: status
        type: string
        description: "New status value: pending, in_progress, or done"
    statement: >
      UPDATE tasks
      SET status = $2
      WHERE id = $1
      RETURNING id, title, status;

  delete_task:
    kind: postgres-sql
    source: alloydb-productivity
    description: Permanently delete a task by its ID.
    parameters:
      - name: task_id
        type: integer
        description: ID of the task to delete
    statement: >
      DELETE FROM tasks
      WHERE id = $1
      RETURNING id, title;

  # ── Notes Tools ───────────────────────────────────────────────────────────────

  create_note:
    kind: postgres-sql
    source: alloydb-productivity
    description: >
      Create a new note. The note embedding is automatically generated by
      AlloyDB AI using the text-embedding-005 model, enabling semantic search.
    parameters:
      - name: title
        type: string
        description: Title of the note
      - name: content
        type: string
        description: Full text content of the note
      - name: tags
        type: string
        description: Comma-separated tags, or empty string if none
    statement: >
      INSERT INTO notes (title, content, tags, embedding)
      VALUES (
        $1, $2, $3,
        embedding('text-embedding-005', $1 || ' ' || $2)::vector
      )
      RETURNING id, title, tags, created_at;

  search_notes_semantic:
    kind: postgres-sql
    source: alloydb-productivity
    description: >
      Search notes using AlloyDB AI semantic vector similarity.
      Returns the 5 most relevant notes for the given natural language query.
    parameters:
      - name: query
        type: string
        description: Natural language search query
    statement: >
      SELECT id, title, content, tags, created_at
      FROM notes
      ORDER BY embedding <=> embedding('text-embedding-005', $1)::vector
      LIMIT 5;

  list_notes:
    kind: postgres-sql
    source: alloydb-productivity
    description: >
      List all notes, optionally filtered by a tag.
      Pass an empty string to list all notes.
    parameters:
      - name: tag
        type: string
        description: Tag to filter by, or empty string for all notes
    statement: >
      SELECT id, title, content, tags, created_at
      FROM notes
      WHERE $1 = '' OR tags ILIKE '%' || $1 || '%'
      ORDER BY created_at DESC;

  delete_note:
    kind: postgres-sql
    source: alloydb-productivity
    description: Permanently delete a note by its ID.
    parameters:
      - name: note_id
        type: integer
        description: ID of the note to delete
    statement: >
      DELETE FROM notes
      WHERE id = $1
      RETURNING id, title;

  # ── Calendar Tools ────────────────────────────────────────────────────────────

  create_event:
    kind: postgres-sql
    source: alloydb-productivity
    description: Create a new calendar event with title, date, time, duration, and description.
    parameters:
      - name: title
        type: string
        description: Title of the event
      - name: date
        type: string
        description: Date of the event in YYYY-MM-DD format
      - name: time
        type: string
        description: Start time in HH:MM (24-hour) format
      - name: duration_minutes
        type: integer
        description: Duration of the event in minutes (default 60)
      - name: description
        type: string
        description: Optional description or agenda for the event
    statement: >
      INSERT INTO events (title, date, time, duration_minutes, description)
      VALUES ($1, $2, $3, $4, $5)
      RETURNING id, title, date, time, duration_minutes, created_at;

  list_events:
    kind: postgres-sql
    source: alloydb-productivity
    description: >
      List calendar events. Filter by a specific date (YYYY-MM-DD),
      or pass an empty string to list all upcoming events.
    parameters:
      - name: date
        type: string
        description: Date to filter by in YYYY-MM-DD format, or empty string for all events
    statement: >
      SELECT id, title, date, time, duration_minutes, description, created_at
      FROM events
      WHERE $1 = '' OR date = $1
      ORDER BY date ASC, time ASC;

  delete_event:
    kind: postgres-sql
    source: alloydb-productivity
    description: Permanently delete a calendar event by its ID.
    parameters:
      - name: event_id
        type: integer
        description: ID of the event to delete
    statement: >
      DELETE FROM events
      WHERE id = $1
      RETURNING id, title;

toolsets:
  task-tools:
    - create_task
    - list_tasks
    - update_task_status
    - delete_task

  notes-tools:
    - create_note
    - search_notes_semantic
    - list_notes
    - delete_note

  calendar-tools:
    - create_event
    - list_events
    - delete_event
